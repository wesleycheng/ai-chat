version: "3.9"

# 生产环境部署配置（ECS）
# 使用: docker compose up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aichat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod
    volumes:
      - uploads:/app/uploads
      - chroma-data:/app/data/chroma
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aichat
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - aichat
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  aichat:
    driver: bridge

volumes:
  uploads:
  chroma-data:
  redis-data:
