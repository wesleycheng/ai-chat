version: "3.9"

# 生产环境部署配置（ECS）
# 使用: docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - aichat

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.prod
    volumes:
      - ./uploads:/app/uploads
      - ./data/chroma:/app/data/chroma
    restart: unless-stopped
    networks:
      - aichat
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  aichat:
    driver: bridge
